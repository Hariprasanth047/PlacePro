<html>

</head>
<body>

<div class="dashboard-container">

    <aside class="sidebar">

        <div class="logo">
            <h2>Admin</h2>
        </div>

        <ul class="menu">

    <main class="main-content">

        <h1>Manage Jobs</h1>

        <input
        type="text"
        id="companyName"

        id="role"
