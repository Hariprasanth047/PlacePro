<!DOCTYPE html>
<html>
<head>
    <title>Job Application</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="application-page">

<div class="application-container">

    <h1>Job Application Form</h1>

    <input
        type="text"
        id="name"
        placeholder="Full Name">

    <input
        type="email"
        id="email"
        placeholder="Email">

    <input
        type="text"
        id="phone"
        placeholder="Phone Number">

    <input
        type="number"
        id="cgpa"
        placeholder="CGPA">

    <textarea
        id="skills"
        placeholder="Skills"></textarea>

    <textarea
        id="certificates"
        placeholder="Certificates"></textarea>

    <textarea
        id="about"
        placeholder="Why should we hire you?"></textarea>

    <button onclick="submitApplication()">
        Submit Application
    </button>

</div>

<script src="css/js/script.js"></script>

</body>
</html>
